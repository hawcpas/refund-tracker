name: refund_tracker
description: "Axume & Associates CPAs Portal"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_web_plugins:
    sdk: flutter

  cloud_firestore: ^6.1.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.4
  firebase_storage: ^13.1.0
  cloud_functions: ^6.0.6

  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  animated_background: ^2.0.0
  file_picker: ^10.3.10
  flutter_web_file_selector: ^0.3.1
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/fonts/

  fonts:
    # ✅ Body / legal text (Intuit-style readability)
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

    # ✅ Headings / branding font
    - family: GeneraGrotesk
      fonts:
        - asset: assets/fonts/GeneraGrotesk-Heavy.ttf
          weight: 800